spring.application.name=v1

# ---- datasource (MySQL 8.4) ----
spring.datasource.url=jdbc:mysql://localhost:3306/yaozher_v1?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=Czy070410.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- SQL init (schema.sql + data.sql) ----
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.encoding=UTF-8

# ---- MyBatis-Plus ----
# NOTE: 部分 IDE（或 Spring 配置元数据）可能提示 unknown property，不影响 Spring Boot 实际运行。
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# ---- Jackson date/time ----
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# ---- upload (custom) ----
# 自定义配置：后续会用 @ConfigurationProperties(prefix = "app") 读取
app.upload-dir=./uploads

# ---- JWT (custom) ----
# 生产环境务必通过环境变量/配置中心覆盖
app.jwt.secret=PLEASE_CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32B+
app.jwt.expire-millis=604800000
