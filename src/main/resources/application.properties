spring.application.name=v1

# ---- datasource (MySQL 8.4) ----
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/yaozher.com?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=Czy070410.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- SQL init ----
# 生产/持久化环境建议关闭自动执行 schema.sql/data.sql，避免覆盖数据。
spring.sql.init.mode=never

# ---- MyBatis-Plus ----
# NOTE: 部分 IDE（或 Spring 配置元数据）可能提示 unknown property，不影响 Spring Boot 实际运行。
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# ---- Jackson date/time ----
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# ---- upload (custom) ----
# 自定义配置：后续会用 @ConfigurationProperties(prefix = "app") 读取
app.upload-dir=./storage/assets/uploads

# ---- avatars (custom) ----
app.avatar-dir=./storage/assets/avatars
app.avatar-url-prefix=/avatars/

# ---- global background (custom) ----
app.background-dir=./storage/assets/backgrounds
app.background-url-prefix=/backgrounds/
app.background-preset-dir=./storage/assets/background-presets
app.background-preset-url-prefix=/background-presets/

# ---- news images (custom) ----
app.news-image-dir=./storage/assets/news-images
app.news-image-url-prefix=/news-images/

# ---- project assets (custom) ----
app.project-cover-dir=./storage/assets/cover-images
app.project-cover-url-prefix=/cover-images/
app.project-file-dir=./storage/assets/project-files
app.project-file-url-prefix=/project-files/

# ---- music library (custom) ----
# Each child directory is treated as one playlist.
app.music-dir=./music-library/MusicForWeb
app.music-url-prefix=/music/

# ---- chatbot API (custom) ----
# API keys are stored encrypted in sys_user and selected per user/admin.
app.api-key-secret=PLEASE_CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32B+
app.chatbot.api-url=https://api.deepseek.com/chat/completions
app.chatbot.model=deepseek-v4-flash
app.chatbot.timeout-seconds=20

# ---- mail (optional; configure for real delivery) ----
