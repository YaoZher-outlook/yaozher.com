worker_processes  1;
pid               logs/nginx.pid;
error_log         logs/error.log warn;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 100m;
    access_log logs/access.log;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream yaozher_backend_prod {
        server 127.0.0.1:37631;
    }

    server {
        listen 38200 default_server;
        server_name yaozher.com www.yaozher.com 222.210.25.53 localhost;

        root "__YAOZHER_FRONTEND_DIST__";
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://yaozher_backend_prod;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        location /ws/ {
            proxy_pass http://yaozher_backend_prod;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location ~ ^/(uploads|avatars|backgrounds|background-presets|news-images|cover-images|project-covers|resources|project-files|music)/ {
            proxy_pass http://yaozher_backend_prod;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }

    server {
        listen 38200;
        server_name yy.yaozher.com;

        root "__YAOZHER_YY_SITE_ROOT__";
        index index.html;
        charset utf-8;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
