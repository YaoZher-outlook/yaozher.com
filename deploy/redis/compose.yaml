services:
  redis:
    image: redis:7.4-alpine
    container_name: yaozher-redis
    restart: unless-stopped
    environment:
      YAOZHER_REDIS_PASSWORD: ${YAOZHER_REDIS_PASSWORD:?Set YAOZHER_REDIS_PASSWORD}
    command:
      - sh
      - -c
      - exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${YAOZHER_REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:${YAOZHER_REDIS_PORT:-46379}:46379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - yaozher-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${YAOZHER_REDIS_PASSWORD}\" redis-cli -p 46379 ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: yaozher-redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      RI_ENCRYPTION_KEY: ${YAOZHER_REDISINSIGHT_ENCRYPTION_KEY:?Set YAOZHER_REDISINSIGHT_ENCRYPTION_KEY}
      RI_APP_PORT: 45540
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 46379
      RI_REDIS_ALIAS: yaozher-redis
      RI_REDIS_PASSWORD: ${YAOZHER_REDIS_PASSWORD:?Set YAOZHER_REDIS_PASSWORD}
    ports:
      - "127.0.0.1:${YAOZHER_REDISINSIGHT_PORT:-45540}:45540"
    volumes:
      - yaozher-redisinsight-data:/data

volumes:
  yaozher-redis-data:
  yaozher-redisinsight-data:
