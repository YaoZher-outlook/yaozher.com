spring.application.name=v1
spring.profiles.default=dev
spring.config.import=optional:file:.env.local.properties

# ---- UTF-8 HTTP / logs ----
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.messages.encoding=UTF-8
logging.charset.console=UTF-8
logging.charset.file=UTF-8
# jaudiotagger emits one INFO line per FLAC metadata block while switching tracks.
logging.level.org.jaudiotagger=WARN

# ---- QQ SMTP mail ----
spring.mail.host=smtp.qq.com
spring.mail.port=465
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ---- Redis ----
spring.data.redis.host=${YAOZHER_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${YAOZHER_REDIS_PORT:46379}
spring.data.redis.password=${YAOZHER_REDIS_PASSWORD:}
spring.data.redis.database=${YAOZHER_REDIS_DATABASE:0}
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=2s
spring.data.redis.repositories.enabled=false

# ---- chatbot providers ----
app.chatbot.openai-api-url=https://api.openai.com/v1/chat/completions
app.chatbot.openai-model=gpt-5.4-mini

# ---- weather providers ----
app.weather.primary-url=https://api.open-meteo.com/v1/forecast
app.weather.fallback-url=https://wttr.in
app.weather.connect-timeout-seconds=4
app.weather.request-timeout-seconds=10

# ---- resource download bandwidth guard ----
app.bandwidth.resource-download.enabled=true
app.bandwidth.resource-download.bytes-per-second=1048576
app.bandwidth.resource-download.max-concurrent-per-client=2
