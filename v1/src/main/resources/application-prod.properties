server.port=37631
server.address=127.0.0.1
server.forward-headers-strategy=framework

# ---- datasource (MySQL 8.4) ----
spring.datasource.url=jdbc:mysql://${YAOZHER_DB_HOST:127.0.0.1}:${YAOZHER_DB_PORT:43306}/${YAOZHER_DB_NAME:yaozher.com}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${YAOZHER_DB_USERNAME:root}
spring.datasource.password=${YAOZHER_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- SQL init ----
spring.sql.init.mode=never

# ---- MyBatis-Plus ----
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# ---- Jackson date/time ----
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# ---- upload (custom) ----
app.upload-dir=./storage/assets/uploads

# ---- avatars (custom) ----
app.avatar-dir=./storage/assets/avatars
app.avatar-url-prefix=/avatars/

# ---- global background (custom) ----
app.background-dir=./storage/assets/backgrounds
app.background-url-prefix=/backgrounds/
app.background-preset-dir=./storage/assets/background-presets
app.background-preset-url-prefix=/background-presets/

# ---- news images (custom) ----
app.news-image-dir=./storage/assets/news-images
app.news-image-url-prefix=/news-images/

# ---- project assets (custom) ----
app.project-cover-dir=./storage/assets/cover-images
app.project-cover-url-prefix=/cover-images/
app.project-file-dir=./storage/assets/resources
app.project-file-url-prefix=/resources/

# ---- resource download bandwidth guard ----
app.bandwidth.resource-download.enabled=true
app.bandwidth.resource-download.bytes-per-second=1048576
app.bandwidth.resource-download.max-concurrent-per-client=2

# ---- music library (custom) ----
app.music-dir=./music-library/MusicForWeb
app.music-url-prefix=/music/
app.lyric-dir=./music-library/MusicForWeb/LRCs

# ---- chatbot API (custom) ----
app.api-key-secret=${YAOZHER_API_KEY_SECRET}
app.chatbot.api-url=https://api.deepseek.com/chat/completions
app.chatbot.model=deepseek-v4-flash
app.chatbot.timeout-seconds=20

# ---- JWT (custom) ----
app.jwt.secret=${YAOZHER_JWT_SECRET}
app.jwt.expire-millis=604800000

# ---- CORS ----
app.cors.allowed-origins=https://yaozher.com,https://www.yaozher.com,http://yaozher.com,http://www.yaozher.com,http://yaozher.com:38200,http://www.yaozher.com:38200,http://222.210.25.53:38200,http://localhost:38200,http://127.0.0.1:38200
